<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slack Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1d21;
      --sidebar: #19171d;
      --surface: #222529;
      --border: #363a3f;
      --accent: #4a9eed;
      --green: #2bac76;
      --red: #e8445a;
      --text: #d1d2d3;
      --muted: #8b8f94;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .workspace-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 2px;
    }

    .workspace-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 20px 8px 8px;
    }

    .sidebar-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .channel-list {
      list-style: none;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .channel-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .channel-item.active { background: var(--accent); color: var(--white); }
    .channel-item .hash { font-size: 1rem; opacity: 0.7; }

    .loading-channels {
      padding: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
    }

    .chat-header .channel-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
    }

    .chat-header .channel-hash {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      display: flex;
      gap: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.1s;
    }

    .message:hover { background: rgba(255,255,255,0.03); }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
      margin-top: 2px;
    }

    .message-body { flex: 1; min-width: 0; }

    .message-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 3px;
    }

    .message-author { font-size: 0.88rem; font-weight: 600; color: var(--white); }
    .message-time   { font-size: 0.72rem; color: var(--muted); }
    .message-text   { font-size: 0.9rem; color: var(--text); line-height: 1.5; word-break: break-word; }

    .message.sent .avatar { background: var(--green); }

    .toast {
      margin: 0 24px 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      display: none;
    }

    .toast.success { background: rgba(43,172,118,0.15); color: var(--green); border: 1px solid rgba(43,172,118,0.3); display: block; }
    .toast.error   { background: rgba(232,68,90,0.15);  color: var(--red);   border: 1px solid rgba(232,68,90,0.3);  display: block; }

    .input-area {
      padding: 12px 24px 20px;
      background: var(--bg);
    }

    .input-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--white);
      line-height: 1.5;
      max-height: 120px;
      min-height: 22px;
    }

    .input-box textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 34px; height: 34px;
      border-radius: 7px;
      border: none;
      background: var(--accent);
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .send-btn:hover   { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    .no-channel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .no-channel svg { opacity: 0.3; }
    .no-channel p { font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="workspace-name">Slack Messenger</div>
      <div class="workspace-status"><span class="dot"></span> 연결됨</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">채널</div>
      <ul class="channel-list" id="channelList">
        <li class="loading-channels">채널 불러오는 중…</li>
      </ul>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="no-channel" id="noChannel">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>채널을 선택해 메시지를 보내세요</p>
    </div>

    <div id="chatView" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-header">
        <span class="channel-hash">#</span>
        <span class="channel-name" id="chatChannelName"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="toast" id="toast"></div>
      <div class="input-area">
        <div class="input-box">
          <textarea id="msgInput" placeholder="메시지 입력…" rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="전송">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    let selectedChannel = null;

    function formatTime(date) {
      return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type}`;
      setTimeout(() => { el.className = 'toast'; }, 3500);
    }

    function appendMessage(text, isSent) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message${isSent ? ' sent' : ''}`;
      div.innerHTML = `
        <div class="avatar">${isSent ? 'Me' : 'SL'}</div>
        <div class="message-body">
          <div class="message-meta">
            <span class="message-author">${isSent ? '나' : 'Slack'}</span>
            <span class="message-time">${formatTime(new Date())}</span>
          </div>
          <div class="message-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function loadChannels() {
      try {
        const resp = await fetch('/api/slack/channels');
        const json = await resp.json();

        const list = document.getElementById('channelList');

        if (!json.success || !Array.isArray(json.data?.channels)) {
          list.innerHTML = '<li class="loading-channels">채널을 불러올 수 없습니다</li>';
          return;
        }

        list.innerHTML = '';
        let defaultEl = null;
        let defaultCh = null;
        json.data.channels.forEach(ch => {
          const name = ch.name || ch.id;
          const li = document.createElement('li');
          li.className = 'channel-item';
          li.innerHTML = `<span class="hash">#</span>${name}`;
          li.dataset.id = ch.id;
          li.dataset.name = name;
          li.addEventListener('click', () => selectChannel(ch.id, name, li));
          list.appendChild(li);
          if (ch.id === 'C0ATEPVKTTK') { defaultEl = li; defaultCh = { id: ch.id, name }; }
        });
        if (defaultEl && defaultCh) selectChannel(defaultCh.id, defaultCh.name, defaultEl);
      } catch {
        document.getElementById('channelList').innerHTML =
          '<li class="loading-channels">오류: 채널 로드 실패</li>';
      }
    }

    function selectChannel(id, name, el) {
      document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      selectedChannel = id;

      document.getElementById('noChannel').style.display = 'none';
      const chat = document.getElementById('chatView');
      chat.style.display = 'flex';
      document.getElementById('chatChannelName').textContent = name;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('msgInput').focus();
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !selectedChannel) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      appendMessage(text, true);

      try {
        const resp = await fetch('/api/slack/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: selectedChannel, text }),
        });
        const json = await resp.json();
        if (json.success) {
          showToast('메시지를 전송했습니다', 'success');
        } else {
          showToast(`전송 실패: ${json.error || '알 수 없는 오류'}`, 'error');
        }
      } catch {
        showToast('네트워크 오류가 발생했습니다', 'error');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);

    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    loadChannels();
  </script>
</body>
</html>
